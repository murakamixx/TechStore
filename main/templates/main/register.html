{% extends "main/base.html" %}
{% block title %}Регистрация | TechStore{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-box card panel">
        <h1 class="auth-title">Создать аккаунт</h1>

        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="field">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="field-error">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>

        <p class="auth-hint">
            Уже есть аккаунт?
            <a href="{% url 'login' %}" class="accent-link">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
