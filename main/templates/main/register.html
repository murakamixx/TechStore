{% extends "main/base.html" %}
{% block title %}Регистрация | TechStore{% endblock %}

{% block content %}
<h1 class="section-title">Создание аккаунта</h1>
<div class="auth-single">
    <section class="card panel">
        <form>
            <div class="field">
                <label for="reg-name">Имя пользователя</label>
                <input id="reg-name" type="text" placeholder="tech_user">
            </div>
            <div class="field">
                <label for="reg-email">Email</label>
                <input id="reg-email" type="email" placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="reg-password">Пароль</label>
                <input id="reg-password" type="password" placeholder="********">
            </div>
            <button type="button" class="btn btn-primary">Создать аккаунт</button>
        </form>
        <p class="muted form-hint">Уже зарегистрированы? <a href="{% url 'login' %}" class="accent-link">Войти</a></p>
    </section>
</div>
{% endblock %}
